name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      safe_version: ${{ steps.version.outputs.safe_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_title: ${{ steps.version.outputs.release_title }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        run: python tools/version.py --github-output

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: windows-x64
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux-x64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPMTB_VERSION_OVERRIDE="${{ needs.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install README renderer
        run: python -m pip install markdown

      - name: Render HTML README
        run: python tools/render_readme_html.py README.md build/README.html

      - name: Package release archive
        run: >
          python tools/package_release.py
          --platform ${{ matrix.label }}
          --version ${{ needs.version.outputs.safe_version }}
          --build-dir build
          --readme-html build/README.html
          --output-dir dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PatchMeshToBrushes-${{ needs.version.outputs.safe_version }}-${{ matrix.label }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - version
      - build

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.version.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.version.outputs.release_title }}
        run: |
          mapfile -t files < <(find dist -name '*.zip' -type f | sort)
          create_args=(
            "$RELEASE_TAG"
            "${files[@]}"
            --title "$RELEASE_TITLE"
            --generate-notes
            --latest
          )

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            create_args+=(--verify-tag)
          else
            create_args+=(--target "$GITHUB_SHA")
          fi

          gh release create "${create_args[@]}"

          prerelease="$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)"
          if [[ "$prerelease" != "false" ]]; then
            echo "::error::Release $RELEASE_TAG was marked as a pre-release."
            exit 1
          fi
