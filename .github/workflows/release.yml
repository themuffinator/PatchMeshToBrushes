name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux-x64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install README renderer
        run: python -m pip install markdown

      - name: Render HTML README
        run: python tools/render_readme_html.py README.md build/README.html

      - name: Package release archive
        run: >
          python tools/package_release.py
          --platform ${{ matrix.label }}
          --build-dir build
          --readme-html build/README.html
          --output-dir dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PatchMeshToBrushes-${{ matrix.label }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist -name '*.zip' -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --title "PatchMeshToBrushes $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
