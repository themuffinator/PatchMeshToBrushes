name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: windows-x64
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux-x64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
